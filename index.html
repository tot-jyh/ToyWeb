<!DOCTYPE html>
<!-- 
  DOCTYPE : 이 파일이 HTML5 문서라는 선언. 맨 위에 항상 있어야 함.
  HTML 이전 버전에서는 매우 복잡한 선언이 필요했지만 HTML5부터는 이렇게 단순해짐.
-->

<html lang="ko">
<!--
  <html> : 문서의 시작과 끝을 감싸는 최상위 태그
  lang="ko" : 이 페이지가 한국어임을 브라우저에 알려줌 (접근성, SEO에 도움)
-->

<head>
  <!--
    <head> : 브라우저에게 주는 "설정 정보" 영역.
    화면에 직접 보이지 않음.
    - 페이지 제목
    - 문자 인코딩 (한글 깨짐 방지)
    - CSS 스타일 등이 들어감
  -->
  <meta charset="UTF-8">
  <!--
    <meta charset="UTF-8"> : 한글, 일본어, 특수문자 등이 깨지지 않게 하는 설정.
    델파이의 AnsiString vs WideString 개념처럼, 어떤 인코딩을 쓸지 선언하는 것.
    UTF-8은 전 세계 대부분의 문자를 표현 가능한 표준 인코딩.
  -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    viewport : 모바일 기기에서 화면 크기에 맞게 표시하기 위한 설정.
    이게 없으면 스마트폰에서 PC 화면처럼 작게 보임.
  -->

  <title>Index 페이지</title>
  <!--
    <title> : 브라우저 탭에 표시되는 제목.
    화면 안에는 안 보이고, 탭이나 즐겨찾기에서 보임.
  -->

  <style>
    /*
      <style> : CSS(스타일)를 HTML 파일 안에 직접 작성하는 방법.
      CSS = 화면을 꾸미는 언어 (색상, 크기, 위치, 폰트 등)
      
      나중에 규모가 커지면 .css 파일로 분리하지만,
      지금은 파일 하나에 다 넣는 방식(인라인 스타일시트)을 사용.
    */

    /* body : HTML의 실제 화면 내용 전체를 감싸는 태그에 스타일 적용 */
    body {
      /* 
        margin: 0 → 브라우저 기본 여백 제거. 기본값이 있어서 안 쓰면 사방에 빈 공간 생김.
        font-family → 사용할 폰트 지정. 앞에서부터 순서대로 없으면 다음 폰트 사용.
        min-height: 100vh → 최소 높이를 화면 전체(100%)로 설정. vh = viewport height.
        display:flex, justify-content, align-items → 가운데 정렬을 위한 설정 (CSS Flexbox)
        background → 배경색. #1a1a2e는 16진수 색상코드 (어두운 남색)
        color → 글자색
      */
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      color: #eee;
    }

    /* .card : CSS에서 점(.)으로 시작하면 class 선택자. HTML에서 class="card"인 요소에 적용 */
    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;         /* 모서리를 둥글게 */
      padding: 48px 64px;          /* 안쪽 여백. 위아래 48px, 좌우 64px */
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);  /* 그림자 효과 */
    }

    /* .badge : 페이지 번호 표시용 작은 배지 */
    .badge {
      display: inline-block;
      background: #0f3460;
      color: #e94560;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;   /* 소문자를 자동으로 대문자로 표시 */
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.4rem;           /* rem : 기본 글자 크기(16px) 기준 배수. 2.4rem = 약 38px */
      margin: 0 0 12px 0;          /* 위 오른쪽 아래 왼쪽 순서. 아래에만 12px 여백 */
      color: #e94560;
    }

    p {
      color: #aaa;
      margin: 0 0 32px 0;
      font-size: 1rem;
      line-height: 1.6;            /* 줄 간격. 1.6 = 글자 크기의 1.6배 */
    }

    /* .btn : 버튼 스타일 */
    .btn {
      display: inline-block;
      background: #e94560;
      color: white;
      text-decoration: none;       /* a 태그(링크)의 기본 밑줄 제거 */
      padding: 14px 36px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.2s;  /* 마우스 올렸을 때 부드럽게 변하는 효과 */
    }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 12px;
    }

    /* .btn:hover : 마우스를 버튼 위에 올렸을 때 스타일 */
    .btn:hover {
      background: #c73652;
      transform: translateY(-2px);  /* 2px 위로 살짝 올라가는 효과 */
    }
  </style>
</head>

<body>
  <!--
    <body> : 실제 화면에 보이는 내용이 들어가는 영역.
    <head>가 설정이라면, <body>는 실제 콘텐츠.
  -->

  <div class="card">
    <!--
      <div> : 구역을 나누는 용도의 빈 박스 태그.
      아무 의미 없이 그냥 묶어주는 용도.
      class="card" → 위에서 정의한 .card 스타일이 적용됨.
    -->

    <div class="badge">Page 1 / 3</div>

    <h1>Index 페이지</h1>
    <!--
      <h1> ~ <h6> : 제목 태그. 숫자가 작을수록 더 큰 제목.
      h1은 페이지에서 가장 중요한 제목. 보통 페이지당 1개 권장.
    -->

    <p>첫 번째 페이지입니다.<br>아래 버튼을 눌러 다음 페이지로 이동하세요.용용요요요요요요</p>
    <!--
      <br> : 줄바꿈 태그. 닫는 태그 없음.
    -->

    <div class="btn-group">
      <a href="idx2.html" class="btn">idx2 페이지로 이동 →</a>
      <a href="idx3.html" class="btn">마지막 페이지로 이동 →</a>
    </div>
    <!--
      <a href="..."> : 링크 태그. 가장 기본적인 페이지 이동 방법.
      href="idx2.html" → 같은 폴더에 있는 idx2.html 파일로 이동.
      
      델파이의 ShellExecute로 파일 열기와 비슷한 개념이지만,
      웹에서는 그냥 파일 경로(상대 경로)를 쓰면 됨.
    -->
  </div>

</body>
</html>
